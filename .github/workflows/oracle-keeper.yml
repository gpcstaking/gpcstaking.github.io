name: Update Rolling Oracle

on:
  schedule:
    # GitHub cron may start late, so each cloud job maintains its own five-minute loop.
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpc-oracle-keeper
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 270
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install contract dependencies
        run: npm ci

      - name: Run four-hour Oracle keeper loop
        env:
          PRIVATE_KEY: ${{ secrets.ORACLE_KEEPER_PRIVATE_KEY }}
          BSC_RPC_URL: ${{ vars.BSC_RPC_URL }}
          ORACLE_ADDRESS: ${{ vars.ORACLE_ADDRESS }}
          ALLOW_MAINNET_DEPLOY: "yes"
          KEEPER_WAIT_UNTIL_DUE: "yes"
        run: |
          consecutive_failures=0
          for iteration in $(seq 1 48); do
            echo "Keeper iteration ${iteration}/48"
            if npm run update:oracle; then
              consecutive_failures=0
            else
              consecutive_failures=$((consecutive_failures + 1))
              if [ "$consecutive_failures" -ge 2 ]; then
                echo "Two consecutive Oracle updates failed"
                exit 1
              fi
            fi
            if [ "$iteration" -lt 48 ]; then
              sleep 300
            fi
          done
