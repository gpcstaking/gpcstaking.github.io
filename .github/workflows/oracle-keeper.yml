name: Update Rolling Oracle

on:
  schedule:
    # Offset from minute zero to reduce GitHub Actions cron congestion.
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpc-oracle-keeper
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install contract dependencies
        run: npm ci

      - name: Record five-minute Oracle point
        env:
          PRIVATE_KEY: ${{ secrets.ORACLE_KEEPER_PRIVATE_KEY }}
          BSC_RPC_URL: ${{ vars.BSC_RPC_URL }}
          ORACLE_ADDRESS: ${{ vars.ORACLE_ADDRESS }}
          ALLOW_MAINNET_DEPLOY: "yes"
        run: npm run update:oracle
